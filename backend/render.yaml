services:
  - type: web
    name: smartcampusai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false          # lo pones manualmente en el dashboard de Render
      - key: SECRET_KEY
        generateValue: true  # Render genera uno seguro automáticamente
      - key: FRONTEND_URL
        sync: false          # lo pones después de desplegar el frontend en Vercel
